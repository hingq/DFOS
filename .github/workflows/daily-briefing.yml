name: Daily Briefing

on:
  schedule:
    - cron: '0 21 * * *'    # UTC 21:00 = 北京时间 05:00
  workflow_dispatch:          # 手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      # 注意：此步骤使用 Claude Code CLI，与 Python pipeline 的 MINIMAX_API_KEY 独立
      - name: Run daily briefing via claude -p
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "执行 /daily-briefing 命令，生成今天的日报。完成后输出运行摘要。" \
            --allowedTools "Bash(read),Bash(write),Read,Write,Edit"

      - name: Notify
        if: always()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          DATE=$(date +%Y-%m-%d)
          if [ -f "data/output/${DATE}-briefing.md" ]; then
            STATUS="📰 ${DATE} 日报已生成"
          else
            STATUS="⚠️ ${DATE} 日报生成失败"
          fi
          if [ -n "${FEISHU_WEBHOOK:-}" ]; then
            curl -s -X POST "$FEISHU_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"${STATUS}\"}}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: briefing-${{ github.run_number }}
          path: |
            data/output/
            data/intermediate/
            logs/
          retention-days: 90
